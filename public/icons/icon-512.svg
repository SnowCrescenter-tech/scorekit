<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0a0f1c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- 背景 -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect width="510" height="510" x="1" y="1" rx="107" fill="none" stroke="rgba(0,255,136,0.15)" stroke-width="1.5"/>
  <!-- 装饰圆环（扑克筹码风格） -->
  <circle cx="256" cy="224" r="132" fill="none" stroke="#00ff88" stroke-width="3" opacity="0.25"/>
  <circle cx="256" cy="224" r="112" fill="none" stroke="#ffd700" stroke-width="1.5" opacity="0.15" stroke-dasharray="10 6"/>
  <!-- 四角花色装饰 -->
  <text x="96" y="88" font-size="36" fill="#ff6b8a" opacity="0.4">♥</text>
  <text x="400" y="88" font-size="36" fill="#a0c4ff" opacity="0.4">♠</text>
  <text x="96" y="400" font-size="36" fill="#77dd77" opacity="0.4">♣</text>
  <text x="400" y="400" font-size="36" fill="#ffb347" opacity="0.4">♦</text>
  <!-- SK 主文字 -->
  <text x="256" y="260" font-family="Arial, Helvetica, sans-serif" font-size="128" font-weight="bold" fill="#00ff88" text-anchor="middle" filter="url(#glow)">SK</text>
  <!-- ScoreKit 副标题 -->
  <text x="256" y="416" font-family="Arial, Helvetica, sans-serif" font-size="40" fill="#94a3b8" text-anchor="middle" letter-spacing="8">SCOREKIT</text>
</svg>
